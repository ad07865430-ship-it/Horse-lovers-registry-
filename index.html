<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noor - Horse Identity Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#111;
font-family:Arial,sans-serif;
padding:20px;
}

.card{
max-width:430px;
margin:auto;
background:#fff;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

.header{
background:#0b5d1e;
color:#fff;
text-align:center;
padding:15px;
}

.header h2{
margin:0;
font-weight:bold;
}

.photo{
width:100%;
height:260px;
object-fit:cover;
}

.info{
padding:20px;
}

.info p{
margin:8px 0;
font-size:17px;
}

.badge{
background:#198754;
font-size:16px;
padding:8px 15px;
}

.qr{
text-align:center;
margin-top:20px;
}

.qr img{
width:160px;
height:160px;
}

.footer{
background:#0b5d1e;
color:white;
text-align:center;
padding:10px;
font-size:14px;
}
</style>

</head>
<body>

<div class="card">

<div class="header">
<h2>HORSE IDENTITY CARD</h2>
<small>Horse Lovers Registry Pakistan</small>
</div>

<img src="images/IMG-20260609-WA0126.jpg" class="photo">

<div class="info">

<p><b>Name:</b> Noor</p>

<p><b>ID Number:</b> HLR-2025-001</p>

<p><b>Date of Birth:</b> 10-04-2025</p>

<p><b>Breed:</b> Nokra</p>

<p><b>Gender:</b> Female (Mare)</p>

<p><b>Location:</b> Gujrat</p>

<p><b>Status:</b>
<span class="badge">✔ VERIFIED</span>
</p>

<div class="qr">

<img src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=https://ad07865430-ship-it.github.io/Horse-lovers-registry-/">

<p>Scan QR Code</p>

</div>

</div>

<div class="footer">
Horse Lovers Registry Pakistan
</div>

</div>

</body>
</html>
